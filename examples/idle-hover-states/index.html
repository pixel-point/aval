<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>AVAL states</title></head>
  <body>
    <button id="favorite" type="button" aria-pressed="false">Favorite
      <aval-player id="motion" interaction-for="favorite" state="idle" width="64" height="64">
        <source src="/favorite/av1.avl" data-codec="av1">
        <source src="/favorite/vp9.avl" data-codec="vp9">
        <source src="/favorite/h265.avl" data-codec="h265">
        <source src="/favorite/h264.avl" data-codec="h264">
      </aval-player>
      <span id="motion-unavailable" aria-hidden="true" hidden>☆</span>
    </button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
