<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>AVAL integrity</title></head>
  <body>
    <aval-player id="motion" crossorigin="anonymous" width="160" height="160">
      <source src="https://assets.example.test/status/av1.avl" data-codec="av1" integrity="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=">
      <source src="https://assets.example.test/status/vp9.avl" data-codec="vp9" integrity="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=">
      <source src="https://assets.example.test/status/h265.avl" data-codec="h265" integrity="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=">
      <source src="https://assets.example.test/status/h264.avl" data-codec="h264" integrity="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=">
    </aval-player>
    <img id="motion-unavailable" src="/status-fallback.png" alt="Current status" hidden>
    <output id="status">Preparing motion…</output>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
