<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AVAL plain HTML</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <aval-player id="motion">
    <source src="./orbit/av1.avl" data-codec="av1">
    <source src="./orbit/vp9.avl" data-codec="vp9">
    <source src="./orbit/h265.avl" data-codec="h265">
    <source src="./orbit/h264.avl" data-codec="h264">
  </aval-player>
  <img id="motion-unavailable" src="./orbit.png" alt="" width="96" height="96" hidden>
  <button id="pause" type="button">Pause motion</button>
  <script type="module" src="/main.js"></script>
</body>
</html>
