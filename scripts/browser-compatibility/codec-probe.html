<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>AVAL codec isolation probe</title>
    <style>
      :root { font: 16px/1.45 system-ui, sans-serif; color: #f5f5f5; background: #090909; }
      body { margin: 0; }
      main { width: min(72rem, calc(100% - 2rem)); margin: 0 auto; padding: 2rem 0; }
      h1 { margin: 0; font-size: clamp(1.5rem, 4vw, 2.5rem); }
      #probe-status { margin: 1rem 0; padding: .75rem 1rem; border: 1px solid #3f3f46; border-radius: .5rem; }
      #probe-status[data-state="ready"] { border-color: #22c55e; }
      #probe-status[data-state="error"] { border-color: #ef4444; color: #fecaca; }
      #probe-mount { display: grid; min-height: 16rem; place-items: center; overflow: hidden; border-radius: 1rem; background: #111; }
      aval-player { display: block; width: min(100%, 50rem); max-height: 70vh; }
      pre { overflow: auto; max-height: 24rem; padding: 1rem; border-radius: .5rem; background: #18181b; font: 12px/1.45 ui-monospace, monospace; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "@pixel-point/aval-format": "/probe/modules/format/index.js",
          "@pixel-point/aval-graph": "/probe/modules/graph/index.js"
        }
      }
    </script>
    <script type="module" src="/probe/codec-probe.js"></script>
  </head>
  <body>
    <main>
      <h1>AVAL codec isolation probe</h1>
      <p id="probe-status" role="status" aria-live="polite" data-state="loading">
        Validating the requested demo and codec…
      </p>
      <div id="probe-mount" aria-label="Selected codec rendering surface"></div>
      <pre id="probe-result" aria-label="Codec probe JSON"></pre>
    </main>
  </body>
</html>
